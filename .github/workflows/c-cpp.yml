name: C/C++ CI

on:
 push:
  branches: [ "main" ]
 pull_request:
  branches: [ "main" ]

jobs:
 build:

  runs-on: ubuntu-latest

  steps:
   - uses: actions/checkout@v4
   - name: make
     run: make
   - name: Install Readline
     run: |
      sudo apt-get update
      sudo apt-get install -y libreadline-dev
   - name: Compile
     run: make
